<% layout('/layouts/default.html', {title: '订单金额柱状图'}){ %>
<div class="main-content">
	<div class="box box-main">
		<div class="box-header with-border">
			<div class="box-title">
				<i class="fa fa-bar-chart"></i> ${text('订单金额柱状图')}
			</div>
		</div>
		<div class="box-body">
			<div id="chartContainer" style="width: 100%; height: 400px;"></div>
		</div>
	</div>
</div>
<% } %>
<script src="${ctxStatic}/echarts/4.2/echarts.min.js"></script>
<script>
$(function() {
	// 初始化图表
	var chart = echarts.init(document.getElementById('chartContainer'));
	
	// 加载数据
	$.ajax({
		url: '${ctx}/core/ddb/chartData',
		dataType: 'json',
		success: function(data) {
			// 设置图表选项
			var option = {
				title: {
					text: '${text("订单金额统计")}',
					subtext: '${text("按日期统计")}'
				},
				tooltip: {
					trigger: 'axis',
					axisPointer: {
						type: 'shadow'
					}
				},
				grid: {
					left: '3%',
					right: '4%',
					bottom: '3%',
					containLabel: true
				},
				xAxis: {
					type: 'category',
					data: data.xAxis
				},
				yAxis: {
					type: 'value',
					name: '${text("金额")}'
				},
				series: [{
					name: '${text("订单金额")}',
					type: 'bar',
					data: data.series,
					itemStyle: {
						color: '#5470c6'
					}
				}]
			};
			
			// 渲染图表
			chart.setOption(option);
		}
	});
	
	// 响应窗口大小变化
	$(window).resize(function() {
		chart.resize();
	});
});
</script>
